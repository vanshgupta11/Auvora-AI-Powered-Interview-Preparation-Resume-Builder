services:
  # Backend Web Service (Docker — required for Puppeteer/Chromium)
  - type: web
    name: auvora-backend
    runtime: docker
    dockerfilePath: ./Backend/Dockerfile
    dockerContext: ./Backend
    envVars:
      - key: MONGO_URI
        sync: false # Enter your MongoDB Atlas URI in the Render dashboard
      - key: JWT_SECRET
        generateValue: true # Render auto-generates a secure random value
      - key: GOOGLE_GENAI_API_KEY
        sync: false # Enter your Google Gemini API key in the Render dashboard
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false # Enter your Vercel frontend URL, e.g. https://auvora.vercel.app
